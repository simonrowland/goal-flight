id: fleet.bootstrap.execute
domain: fleet
resource: bootstrap
verb: execute
crud: X
summary: Bootstrap ~/.goal-flight/fleet layout
command: >
  ${GOALFLIGHT_PYTHON} ${GOALFLIGHT_REPO}/scripts/goalflight_fleet.py bootstrap --json
env:
  GOALFLIGHT_PYTHON: python3
  GOALFLIGHT_REPO: ${GOALFLIGHT_REPO_ROOT}
requires: []
remote_allowed: false
transport: subprocess
message_types: []

---
id: fleet.status.read
domain: fleet
resource: status
verb: read
crud: R
summary: Fleet store status JSON
command: >
  ${GOALFLIGHT_PYTHON} ${GOALFLIGHT_REPO}/scripts/goalflight_fleet.py status
env:
  GOALFLIGHT_PYTHON: python3
  GOALFLIGHT_REPO: ${GOALFLIGHT_REPO_ROOT}
requires: []
remote_allowed: false
transport: subprocess
message_types: []

---
id: fleet.validate.read
domain: fleet
resource: validate
verb: read
crud: R
summary: Validate fleet JSON schemas on disk
command: >
  ${GOALFLIGHT_PYTHON} ${GOALFLIGHT_REPO}/scripts/goalflight_fleet.py validate
env:
  GOALFLIGHT_PYTHON: python3
  GOALFLIGHT_REPO: ${GOALFLIGHT_REPO_ROOT}
requires: []
