---
id: fleet.reconcile.execute
domain: fleet
resource: reconcile
verb: execute
crud: X
summary: Reconcile stale capacity leases and account locks
command: >
  ${GOALFLIGHT_PYTHON} ${GOALFLIGHT_REPO}/scripts/goalflight_fleet.py reconcile ${GOALFLIGHT_FLEET_RECONCILE_ARGS}
env:
  GOALFLIGHT_PYTHON: python3
  GOALFLIGHT_REPO: ${GOALFLIGHT_REPO_ROOT}
  GOALFLIGHT_FLEET_RECONCILE_ARGS: ""
requires: []
remote_allowed: false
transport: subprocess
message_types: []

---
id: fleet.steering.read
domain: fleet
resource: steering
verb: read
crud: R
summary: Show effective steering policy
command: >
  ${GOALFLIGHT_PYTHON} ${GOALFLIGHT_REPO}/scripts/goalflight_fleet.py steering show
env:
  GOALFLIGHT_PYTHON: python3
  GOALFLIGHT_REPO: ${GOALFLIGHT_REPO_ROOT}
requires: []
remote_allowed: false
transport: subprocess
message_types: [steering]

---
id: fleet.steering.execute
domain: fleet
resource: steering
verb: execute
crud: X
summary: Apply a pending steering proposal by id
command: >
  ${GOALFLIGHT_PYTHON} ${GOALFLIGHT_REPO}/scripts/goalflight_fleet.py steering apply --proposal-id ${GOALFLIGHT_PROPOSAL_ID}
env:
  GOALFLIGHT_PYTHON: python3
  GOALFLIGHT_REPO: ${GOALFLIGHT_REPO_ROOT}
  GOALFLIGHT_PROPOSAL_ID: ""
requires: []
remote_allowed: false
transport: subprocess
message_types: [steering]
