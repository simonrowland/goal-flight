id: core.ledger.read
domain: core
resource: ledger
verb: read
crud: R
summary: List dispatch ledger records
command: >
  ${GOALFLIGHT_PYTHON} ${GOALFLIGHT_REPO}/scripts/goalflight_ledger.py list --json
env:
  GOALFLIGHT_PYTHON: python3
  GOALFLIGHT_REPO: ${GOALFLIGHT_REPO_ROOT}
requires: []
remote_allowed: false
transport: subprocess
message_types: []
