id: core.doctor.read
domain: core
resource: doctor
verb: read
crud: R
summary: Run goal-flight doctor for the current project root
command: >
  ${GOALFLIGHT_PYTHON} ${GOALFLIGHT_REPO}/scripts/goalflight_doctor.py
  --project-root ${GOALFLIGHT_REPO} --json
env:
  GOALFLIGHT_PYTHON: python3
  GOALFLIGHT_REPO: ${GOALFLIGHT_REPO_ROOT}
requires: []
remote_allowed: false
transport: subprocess
message_types: []
