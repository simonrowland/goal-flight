<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>goal-flight · item</title>
<style>
:root{--bg:#fff;--fg:#1a1d21;--muted:#6b7280;--accent:#2563eb;--border:#e5e7eb;--warn:#b45309;
  --card:#fff;--chip:#f3f4f6;--chip-fg:#374151;--ok:#15803d;--danger:#b91c1c;--shadow:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.06)}
@media (prefers-color-scheme:dark){:root{--bg:#0f1115;--fg:#e6e8eb;--muted:#9aa0a6;--accent:#6ea8fe;--border:#262a31;--warn:#f59e0b;
  --card:#161922;--chip:#222732;--chip-fg:#c4cad4;--ok:#4ade80;--danger:#f87171;--shadow:0 1px 2px rgba(0,0,0,.3)}}
*{box-sizing:border-box}
html{font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
body{margin:0;background:var(--bg);color:var(--fg)}
main{max-width:46rem;margin:0 auto;padding:1.5rem 1.25rem 3rem}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
a:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:.3rem}
.crumbs{color:var(--muted);font-size:.85rem;margin:0 0 1.2rem}
.crumbs a{color:var(--muted)}
.idtag{font:.8rem ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted)}
h1{font-size:1.35rem;margin:.2em 0 .6em;letter-spacing:-.01em;line-height:1.35}
.headrow{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin:.2rem 0 1.2rem}
.kind,.sev,.badge{font:.74rem/1.7 ui-monospace,SFMono-Regular,Menlo,monospace;border-radius:1rem;padding:.05rem .6rem}
.kind{background:var(--chip);color:var(--chip-fg)}
.kind-bug{background:rgba(180,83,9,.14);color:var(--warn)}
.kind-decision{background:rgba(37,99,235,.14);color:var(--accent)}
.sev{background:rgba(180,83,9,.14);color:var(--warn)}
.sev-high,.sev-critical{background:rgba(220,38,38,.16);color:var(--danger)}
.badge{border:1px solid var(--border);color:var(--muted)}
.badge-decision{color:var(--warn);border-color:var(--warn)}
.badge-pending{color:var(--accent);border-color:var(--accent)}
.badge-working{color:var(--accent);border-color:var(--accent)}
.badge-awaiting-review{color:#a855f7;border-color:#a855f7}
.badge-worker-failed{color:var(--danger);border-color:var(--danger)}
.badge-waiting{color:var(--warn);border-color:var(--warn)}
.badge-done-reviewed{color:var(--ok);border-color:var(--ok)}
dl{display:grid;grid-template-columns:max-content 1fr;gap:.5rem 1rem;margin:0;
  background:var(--card);border:1px solid var(--border);border-radius:.7rem;padding:1rem 1.1rem;box-shadow:var(--shadow)}
dt{color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.04em;padding-top:.1rem}
dd{margin:0;min-width:0;word-break:break-word}
dd ul{margin:0;padding-left:1.1rem}
.blocker{font:.78rem ui-monospace,SFMono-Regular,Menlo,monospace;border:1px solid var(--warn);color:var(--warn);
  border-radius:1rem;padding:.02rem .55rem;margin-right:.35rem;display:inline-block}
.blocker-ok{color:var(--ok);border-color:var(--ok)}
pre{background:var(--chip);border:1px solid var(--border);border-radius:.5rem;padding:.8rem;overflow:auto;
  font:.85rem ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;margin:.3rem 0 0}
.section-title{font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:1.6rem 0 .5rem}
/* Collapsible activity logs: summary keeps the section-title look plus the
   native disclosure triangle. */
.log-section>summary.section-title{cursor:pointer;user-select:none;display:list-item}
.log-section>summary.section-title:hover{color:var(--fg)}
.log-section[open]>summary.section-title{margin-bottom:.5rem}
.dispatches{list-style:none;margin:.2rem 0 0;padding:0;display:flex;flex-direction:column;gap:.45rem}
.dispatches li{background:var(--card);border:1px solid var(--border);border-radius:.55rem;padding:.65rem .75rem;box-shadow:var(--shadow)}
.dispatch-meta{display:flex;flex-wrap:wrap;gap:.25rem .8rem;font:.78rem ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--fg)}
.dispatch-meta strong{color:var(--muted);font-weight:600}
.dispatch-log{display:inline-block;margin-top:.3rem;word-break:break-all}
.timeline{list-style:none;margin:.2rem 0 0;padding:0;display:flex;flex-direction:column;gap:.35rem}
.timeline-day{font:.75rem ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted);
  text-transform:uppercase;letter-spacing:.05em;margin:.65rem 0 .15rem}
.timeline-event{display:grid;grid-template-columns:3.8rem 1fr;gap:.7rem;align-items:start;
  border-left:2px solid var(--border);padding:.2rem 0 .45rem .8rem}
.timeline-time{font:.76rem ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted);white-space:nowrap}
.timeline-title{font-weight:600}
.timeline-meta{display:block;margin-top:.12rem;color:var(--muted);font-size:.86rem}
.timeline-meta code,.dispatches code{font:.88em ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--fg);
  background:var(--chip);border:1px solid var(--border);border-radius:.35rem;padding:.02rem .25rem}
.timeline-chips{display:flex;gap:.35rem;flex-wrap:wrap;margin:.35rem 0 .55rem}
.duration-chip{font:.72rem/1.7 ui-monospace,SFMono-Regular,Menlo,monospace;background:var(--chip);
  color:var(--chip-fg);border:1px solid var(--border);border-radius:1rem;padding:.02rem .55rem}
.notfound{background:var(--card);border:1px solid var(--warn);border-radius:.7rem;padding:1.2rem;color:var(--warn)}
.idlink{font:inherit ui-monospace,SFMono-Regular,Menlo,monospace}
footer{max-width:46rem;margin:0 auto;padding:1.5rem 1.25rem 2rem;color:var(--muted);font-size:.78rem}
</style>
</head>
<body>
<main>
  <nav class="crumbs" aria-label="Breadcrumb"><a href="tickets.html">← board</a> · <a href="index.html">dashboard</a> · <span class="idtag" id="crumbId"></span></nav>
  <div id="detail">Loading…</div>
</main>
<footer>goal-flight · Tier-2 view</footer>

<script src="tasks-data.js"></script>
<script src="status-data.js"></script>
<script src="gf.js"></script>
<script>
(function(){
  "use strict";
  var mount = document.getElementById("detail");
  var wantId = GF.qs("id");
  document.getElementById("crumbId").textContent = wantId ? wantId : "";

  function row(dt, ddHtml){ return "<dt>"+GF.esc(dt)+"</dt><dd>"+ddHtml+"</dd>"; }

  function blockerList(ids){
    if(!ids || !ids.length) return "<span style='color:var(--muted)'>none</span>";
    return ids.map(function(bid){
      var b = GF.store.byId[bid];
      var ok = b && b.done;
      var cls = "blocker"+(ok?" blocker-ok":"");
      var glyph = ok ? "✓" : "⏸";
      var label = GF.esc(bid)+", blocker "+(ok?"resolved":"still blocking")+(b?"":", unknown item");
      return '<a class="'+cls+'" href="ticket.html?id='+encodeURIComponent(bid)+'" aria-label="'+label+'">'+
             '<span aria-hidden="true">'+glyph+" </span>"+GF.esc(bid)+(b?'':' (unknown)')+"</a>";
    }).join(" ");
  }

  function linkList(links){
    if(!links || !links.length) return "<span style='color:var(--muted)'>none</span>";
    return "<ul>"+links.map(function(l){
      var text = String(l == null ? "" : l).trim();
      if(/^(?:ADR|bp|[tbq])-\d+$/i.test(text)){
        // Flag a link to an id that has no item, so a dangling cross-reference
        // doesn't masquerade as a live ticket (matches blockerList's guard).
        var known = GF.store.byId[text];
        return "<li>"+GF.renderMention(text, "idlink")+(known?"":" <span style='color:var(--muted)'>(unknown)</span>")+"</li>";
      }
      return "<li>"+GF.renderMention(text)+"</li>";
    }).join("")+"</ul>";
  }

  function metaBits(pairs){
    return pairs.filter(function(pair){ return pair[1] != null && String(pair[1]).trim() !== ""; })
      .map(function(pair){
        return "<span><strong>"+GF.esc(pair[0])+":</strong> "+GF.esc(pair[1])+"</span>";
      }).join("");
  }

  function dispatchHistory(dispatches){
    if(!dispatches || !dispatches.length) return "";
    var rows = dispatches.map(function(raw){
      var d = raw && typeof raw === "object" ? raw : {};
      var dispatchId = d.dispatch_id || d.id || "";
      var isReview = !!(d.role || d.verdict || d.findings_ref);
      var meta = isReview
        ? metaBits([
            ["dispatch_id", dispatchId],
            ["role", d.role],
            ["verdict", d.verdict],
            ["ts", d.ts]
          ])
        : metaBits([
            ["dispatch_id", dispatchId],
            ["agent", d.agent],
            ["state", d.state || d.status],
            ["started", d.started_at || d.started || d.ts],
            ["ended", d.ended_at || d.ended]
          ]);
      var extras = [];
      if(isReview && d.findings_ref) extras.push('<span class="dispatch-log">'+GF.renderMention(d.findings_ref)+'</span>');
      if(!isReview && d.marker && typeof d.marker === "object"){
        var marker = [d.marker.kind, d.marker.text].filter(Boolean).join(": ");
        if(marker) extras.push('<span class="dispatch-log">'+GF.autolink(marker)+'</span>');
      }
      var statusPath = d.status_path || d.log || d.path || d.log_path || "";
      if(statusPath) extras.push('<span class="dispatch-log">'+GF.renderMention(statusPath)+'</span>');
      return "<li><div class=\"dispatch-meta\">"+meta+"</div>"+extras.join("")+"</li>";
    }).join("");
    if(!rows) return "";
    return '<details class="log-section"><summary class="section-title">Dispatch history ('+dispatches.length+')</summary>'+
      '<ul class="dispatches">'+rows+"</ul></details>";
  }

  function firstAuditTime(it, actions){
    var audit = Array.isArray(it.audit) ? it.audit : [];
    for(var i=0;i<audit.length;i++){
      var row = audit[i] || {};
      if(actions.indexOf(String(row.action || "")) < 0) continue;
      var t = GF.parseTime(row.at || row.ts || row.time);
      if(t != null) return t;
    }
    return null;
  }

  function pushEvent(events, at, order, titleHtml, metaHtml){
    var t = GF.parseTime(at);
    if(t == null) return;
    events.push({ t:t, order:order, title:titleHtml, meta:metaHtml || "" });
  }

  function auditMeta(row){
    var bits = [];
    if(row.dispatch_id) bits.push("dispatch " + GF.renderMention(row.dispatch_id));
    if(row.review_dispatch_id) bits.push("review " + GF.renderMention(row.review_dispatch_id));
    ["verdict","resolution","note","append_note","append","state","lane"].forEach(function(k){
      if(row[k] != null && String(row[k]).trim() !== "") bits.push(GF.esc(k) + " " + GF.autolink(row[k]));
    });
    ["findings_ref","source_ref","harvest_source"].forEach(function(k){
      if(row[k] != null && String(row[k]).trim() !== "") bits.push(GF.esc(k) + " " + GF.renderMention(row[k]));
    });
    return bits.join(" · ");
  }

  function dispatchEventMeta(d, isReview){
    var bits = [];
    var dispatchId = d.dispatch_id || d.id || "";
    if(dispatchId) bits.push("dispatch " + GF.renderMention(dispatchId));
    if(isReview && d.role) bits.push("role " + GF.esc(d.role));
    if(!isReview && d.agent) bits.push("agent " + GF.esc(d.agent));
    if(d.started_at || d.started) bits.push("started " + GF.esc(GF.fmtClock(GF.parseTime(d.started_at || d.started))));
    if(d.ended_at || d.ended) bits.push("ended " + GF.esc(GF.fmtClock(GF.parseTime(d.ended_at || d.ended))));
    if(d.findings_ref) bits.push("findings " + GF.renderMention(d.findings_ref));
    if(d.marker && typeof d.marker === "object"){
      var marker = [d.marker.kind, d.marker.text].filter(Boolean).join(": ");
      if(marker) bits.push("marker " + GF.autolink(marker));
    }
    return bits.join(" · ");
  }

  function durationChips(it){
    var logged = GF.parseTime(it.created_at) || firstAuditTime(it, ["new","harvest","review-bug-capture"]);
    var firstStart = null;
    (it.dispatches || []).forEach(function(d){
      var t = GF.parseTime((d && (d.started_at || d.started || d.ts)) || "");
      if(t != null && (firstStart == null || t < firstStart)) firstStart = t;
    });
    var done = GF.parseTime(it.done_at) || GF.parseTime(it.closed_at) || GF.parseTime(it.completed_at) ||
      firstAuditTime(it, ["done","close","closed"]);
    var reviewed = GF.parseTime(it.done_reviewed_at) || GF.parseTime(it.reviewed_at) ||
      firstAuditTime(it, ["review","accept"]);
    var chips = [];
    function chip(label, a, b){
      if(a == null || b == null || b < a) return;
      var dur = GF.formatDurationMs(b - a);
      if(dur) chips.push('<span class="duration-chip">'+GF.esc(label)+" "+GF.esc(dur)+"</span>");
    }
    chip("logged→dispatch", logged, firstStart);
    chip("start→done", firstStart, done);
    chip("done→reviewed", done, reviewed);
    return chips.length ? '<div class="timeline-chips">'+chips.join("")+"</div>" : "";
  }

  function timeline(it){
    var events = [];
    var created = it.created_at || null;
    if(!created){
      var c = firstAuditTime(it, ["new","harvest","review-bug-capture"]);
      created = c == null ? null : new Date(c).toISOString();
    }
    pushEvent(events, created, 0, "created", "");

    (it.audit || []).forEach(function(row, idx){
      row = row && typeof row === "object" ? row : {};
      var action = String(row.action || "audit");
      var actor = row.actor ? " by " + GF.esc(row.actor) : "";
      pushEvent(events, row.at || row.ts || row.time, 10 + idx, GF.esc(action) + actor, auditMeta(row));
    });

    (it.dispatches || []).forEach(function(raw, idx){
      var d = raw && typeof raw === "object" ? raw : {};
      var isReview = !!(d.role || d.verdict || d.findings_ref);
      var label = isReview
        ? "review" + (d.verdict ? " " + GF.esc(d.verdict) : "")
        : "dispatch" + (d.state || d.status ? " " + GF.esc(d.state || d.status) : "");
      pushEvent(events, d.started_at || d.started || d.ts || d.ended_at || d.ended, 500 + idx, label, dispatchEventMeta(d, isReview));
    });

    pushEvent(events, it.done_at || it.closed_at || it.completed_at, 900, "done", "");
    pushEvent(events, it.done_reviewed_at || it.reviewed_at, 901, "reviewed", "");
    events.sort(function(a,b){ return a.t - b.t || a.order - b.order; });
    if(!events.length) return "";

    var lastDay = "";
    var rows = events.map(function(ev){
      var day = new Date(ev.t).toDateString();
      var dayHtml = "";
      if(day !== lastDay){
        lastDay = day;
        dayHtml = '<li class="timeline-day">'+GF.esc(GF.fmtDayLabel(ev.t))+"</li>";
      }
      return dayHtml + '<li class="timeline-event"><span class="timeline-time">'+GF.esc(GF.fmtClock(ev.t))+
        '</span><span><span class="timeline-title">'+ev.title+'</span>'+
        (ev.meta ? '<span class="timeline-meta">'+ev.meta+"</span>" : "")+
        "</span></li>";
    }).join("");
    return '<details class="log-section" open><summary class="section-title">Timeline ('+events.length+' events)</summary>'+
      durationChips(it)+'<ul class="timeline">'+rows+"</ul></details>";
  }

  function render(){
    var it = wantId ? GF.store.byId[wantId] : null;
    if(!it){
      mount.innerHTML =
        '<div class="notfound"><strong>Item not found</strong><br>'+
        (wantId ? "No item with id <code>"+GF.esc(wantId)+"</code>." : "No <code>?id=</code> given.")+
        ' <a href="tickets.html">Back to the board →</a></div>';
      document.title = "goal-flight · not found";
      return;
    }
    var sec = it._section;
    document.title = "goal-flight · " + it.id;
    var html = "<h1>"+GF.autolink(it.title)+"</h1>";
    html += '<div class="headrow">'+GF.kindBadge(it.kind)+GF.statusBadge(sec)+
            (it.kind==="bug"&&it.severity?'<span class="sev sev-'+GF.esc(it.severity)+'">'+GF.esc(it.severity)+"</span>":"")+"</div>";

    html += "<dl>";
    html += row("id", '<span class="idtag">'+GF.esc(it.id)+"</span>");
    html += row("kind", GF.esc(it.kind));
    html += row("status", GF.esc(GF.STATUS_LABELS[sec]||sec));
    html += row("blocked by", blockerList(it.blocked_by));
    html += row("links", linkList(it.links));
    if(it.kind==="bug"){
      if(it.severity) html += row("severity", GF.esc(it.severity));
      if(it.pattern)  html += row("pattern", GF.idLink(it.pattern, "idlink"));
      if(it.source)   html += row("source", GF.esc(it.source));
    }
    if(it.source && it.kind!=="bug") html += row("source", GF.esc(it.source));
    var completedAt = it.completed_at || it.done_at || it.closed_at;
    if(completedAt) html += row("completed", GF.esc(completedAt));
    html += "</dl>";

    if(it.acceptance){
      html += '<p class="section-title">Acceptance</p><p>'+GF.autolink(it.acceptance)+"</p>";
    }
    if(it.prompt){
      html += '<p class="section-title">Prompt</p><pre>'+GF.esc(it.prompt)+"</pre>";
    } else if(it.prompt_path){
      html += '<p class="section-title">Prompt</p><p>'+GF.renderMention(it.prompt_path)+"</p>";
    }
    html += dispatchHistory(it.dispatches);
    html += timeline(it);
    mount.innerHTML = html;
  }

  GF.attach({ onRender: render });
})();
</script>
</body>
</html>
